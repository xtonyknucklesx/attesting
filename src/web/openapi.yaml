openapi: 3.0.3
info:
  title: Crosswalk API
  description: OSCAL-native GRC platform — governance, risk, compliance, threat intelligence, and drift detection.
  version: 0.3.0
  license:
    name: MIT
servers:
  - url: http://localhost:3000/api
    description: Local development

paths:
  /org:
    get:
      summary: Get organization and scopes
      tags: [Organization]
      responses:
        "200":
          description: Organization with scopes array

  /catalogs:
    get:
      summary: List all catalogs
      tags: [Catalogs]
      responses:
        "200":
          description: Array of catalogs

  /catalogs/{shortName}:
    get:
      summary: Get catalog by short name
      tags: [Catalogs]
      parameters:
        - name: shortName
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Catalog with metadata
        "404":
          description: Not found

  /catalogs/{shortName}/controls:
    get:
      summary: List controls for a catalog
      tags: [Catalogs]
      parameters:
        - name: shortName
          in: path
          required: true
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 100 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
        - name: search
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Paginated controls array

  /mappings/summary:
    get:
      summary: Mapping summary stats
      tags: [Mappings]
      responses:
        "200":
          description: Total mappings, by target, source controls

  /mappings/resolve/{catalog}/{controlId}:
    get:
      summary: Resolve mappings for a control
      tags: [Mappings]
      parameters:
        - name: catalog
          in: path
          required: true
          schema: { type: string }
        - name: controlId
          in: path
          required: true
          schema: { type: string }
        - name: depth
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Direct and transitive mappings

  /implementations:
    get:
      summary: List implementations
      tags: [Implementations]
      parameters:
        - name: status
          in: query
          schema: { type: string }
        - name: catalog
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Paginated implementations
    post:
      summary: Create implementation
      tags: [Implementations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [primary_control_id, status, statement]
              properties:
                primary_control_id: { type: string }
                status: { type: string, enum: [implemented, partially-implemented, planned, not-applicable] }
                statement: { type: string }
      responses:
        "201":
          description: Created

  /risk/register:
    get:
      summary: List risks
      tags: [Risk]
      parameters:
        - name: category
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Array of risks
    post:
      summary: Create risk
      tags: [Risk]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, owner, likelihood, impact]
              properties:
                title: { type: string }
                owner: { type: string }
                likelihood: { type: integer, minimum: 1, maximum: 5 }
                impact: { type: integer, minimum: 1, maximum: 5 }
                category: { type: string }
                treatment: { type: string, enum: [mitigate, accept, transfer, avoid] }
      responses:
        "201":
          description: Created with risk_id

  /risk/matrix:
    get:
      summary: Get risk matrix with risk distribution
      tags: [Risk]
      responses:
        "200":
          description: Matrix config and risks

  /risk/exceptions:
    get:
      summary: List risk exceptions
      tags: [Risk]
      responses:
        "200":
          description: Array of exceptions

  /risk/dashboard:
    get:
      summary: Risk dashboard stats
      tags: [Risk]
      responses:
        "200":
          description: Aggregate risk statistics

  /intel/threats:
    get:
      summary: List threat inputs
      tags: [Intel]
      parameters:
        - name: severity
          in: query
          schema: { type: string, enum: [info, low, medium, high, critical] }
        - name: processed
          in: query
          schema: { type: boolean }
      responses:
        "200":
          description: Array of threat inputs

  /intel/manual:
    get:
      summary: List manual intel entries
      tags: [Intel]
      responses:
        "200":
          description: Array of manual intel
    post:
      summary: Submit manual intel
      tags: [Intel]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, description]
              properties:
                title: { type: string }
                description: { type: string }
                severityEstimate: { type: string }
                intelType: { type: string }
      responses:
        "201":
          description: Created with shadow impact

  /intel/manual/{id}/shadow:
    get:
      summary: Shadow impact analysis
      tags: [Intel]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Shadow report

  /intel/manual/{id}/promote:
    post:
      summary: Promote intel to confirmed threat
      tags: [Intel]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Promoted with threat_id and propagation log

  /drift/alerts:
    get:
      summary: List drift alerts
      tags: [Drift]
      parameters:
        - name: status
          in: query
          schema: { type: string, enum: [active, resolved, suppressed, all] }
        - name: severity
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Array of drift alerts

  /drift/dashboard:
    get:
      summary: Drift dashboard stats
      tags: [Drift]
      responses:
        "200":
          description: Active count, by severity, by type, pending approvals

  /drift/dispositions:
    post:
      summary: Process disposition text through NLP pipeline
      tags: [Drift]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [drift_alert_id, analyst_id, text]
              properties:
                drift_alert_id: { type: string }
                analyst_id: { type: string }
                text: { type: string }
      responses:
        "200":
          description: Processed disposition with classification

  /drift/dispositions/commit:
    post:
      summary: Commit a processed disposition
      tags: [Drift]
      responses:
        "201":
          description: Committed with task IDs

  /assets:
    get:
      summary: List assets
      tags: [Assets]
      parameters:
        - name: type
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Array of assets
    post:
      summary: Create asset
      tags: [Assets]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, asset_type]
              properties:
                name: { type: string }
                asset_type: { type: string }
                platform: { type: string }
      responses:
        "201":
          description: Created

  /assets/{id}:
    get:
      summary: Get asset with relationships
      tags: [Assets]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Asset with threats and risks
        "404":
          description: Not found
    put:
      summary: Update asset
      tags: [Assets]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Updated
    delete:
      summary: Delete asset
      tags: [Assets]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Deleted

  /connectors:
    get:
      summary: List connectors
      tags: [Connectors]
      responses:
        "200":
          description: Array of connectors with sync stats
    post:
      summary: Register connector
      tags: [Connectors]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, connector_type, adapter_class]
              properties:
                name: { type: string }
                connector_type: { type: string }
                adapter_class: { type: string }
                config: { type: object }
      responses:
        "201":
          description: Created

  /connectors/{id}/sync:
    post:
      summary: Trigger sync
      tags: [Connectors]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Sync result

  /connectors/{id}/healthcheck:
    post:
      summary: Run health check
      tags: [Connectors]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Health status

  /connectors/{id}/logs:
    get:
      summary: Sync log history
      tags: [Connectors]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Array of sync log entries

  /connectors/adapters:
    get:
      summary: List available adapter types
      tags: [Connectors]
      responses:
        "200":
          description: Array of adapter class names

  /governance/policies:
    get:
      summary: List policies
      tags: [Governance]
      responses:
        "200":
          description: Array of policies
    post:
      summary: Create policy
      tags: [Governance]
      responses:
        "201":
          description: Created

  /governance/committees:
    get:
      summary: List committees
      tags: [Governance]
      responses:
        "200":
          description: Array of committees

  /governance/roles:
    get:
      summary: List roles
      tags: [Governance]
      responses:
        "200":
          description: Array of roles

  /import/formats:
    get:
      summary: List supported import formats
      tags: [Import]
      responses:
        "200":
          description: Formats with size limits

  /import/preview:
    post:
      summary: Upload and preview catalog import
      tags: [Import]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Preview with controls and mappings
        "400":
          description: File rejected by security scan

  /import/confirm:
    post:
      summary: Execute a previewed import
      tags: [Import]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [upload_path, original_name]
              properties:
                upload_path: { type: string }
                original_name: { type: string }
                format: { type: string }
                overwrite: { type: boolean }
      responses:
        "201":
          description: Import result

tags:
  - name: Organization
  - name: Catalogs
  - name: Mappings
  - name: Implementations
  - name: Risk
  - name: Intel
  - name: Drift
  - name: Assets
  - name: Connectors
  - name: Governance
  - name: Import
